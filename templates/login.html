<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso - MiniERP</title>
    <script src="/static/js/tailwindcss.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <!-- Logo / Testata -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-900/50 mb-4">
                <span class="text-white font-bold text-3xl">M</span>
            </div>
            <h1 class="text-2xl font-bold text-white">MiniERP</h1>
            <p class="text-indigo-300 text-sm mt-1">Gestione Aziendale</p>
        </div>

        <!-- Card Login -->
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <h2 class="text-lg font-semibold text-white mb-6">Accedi al sistema</h2>

                <form action="/login" method="POST" class="space-y-4">

                    <div>
                        <label class="block text-sm font-medium text-indigo-200 mb-1.5">Nome Utente</label>
                        <input type="text" name="username" required autofocus
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all"
                            placeholder="Nome utente">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-indigo-200 mb-1.5">Password</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all"
                            placeholder="••••••••">
                    </div>

                    {% if error %}
                    <div
                        class="flex items-center gap-2 p-3 bg-red-500/20 border border-red-400/30 rounded-xl text-red-300 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        {{ error }}
                    </div>
                    {% endif %}

                    <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-900/50 mt-2">
                        Accedi
                    </button>
                </form>
            </div>

            <div class="px-8 py-4 bg-black/20 border-t border-white/10 text-center text-xs text-white/40">
                Design &amp; Creation di Nicola Guerra
            </div>
        </div>
    </div>

</body>

</html>
