    <title>MiniERP MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Force background colors to print and handle page layout */
      @media print {
        @page {
          margin: 0;
          size: A4;
        }
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          background-color: white;
          margin: 0;
          padding: 0;
        }
        /* Hide everything that isn't the printable content */
        body > * {
          display: none !important;
        }
        /* But show the root and the specific content */
        body > #root {
          display: block !important;
        }
        /* Ensure the printable area takes full width/height and has no overflow clipping */
        #root, #root > * {
          width: 100%;
          height: auto;
          overflow: visible !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        /* Utility to force page break */
        .page-break {
          page-break-before: always;
        }
      }
    </style>
